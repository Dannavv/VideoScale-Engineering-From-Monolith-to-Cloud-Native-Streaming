worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=VIDEO_CACHE:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;

        location / {
            proxy_pass http://backend:8000;
            
            # 1. Cache Video Segments
            location ~* \.ts$ {
                proxy_cache VIDEO_CACHE;
                proxy_cache_valid 200 60m;
                add_header X-Cache-Status $upstream_cache_status always;
                add_header Access-Control-Expose-Headers X-Cache-Status always;
                proxy_pass http://backend:8000;
            }

            # 2. Cache Manifests Briefly
            location ~* \.m3u8$ {
                proxy_cache VIDEO_CACHE;
                proxy_cache_valid 200 5s;
                add_header X-Cache-Status $upstream_cache_status always;
                add_header Access-Control-Expose-Headers X-Cache-Status always;
                proxy_pass http://backend:8000;
            }

            # 3. Lab Status Tracking
            location /status {
                proxy_cache VIDEO_CACHE;
                proxy_cache_valid 200 60m;
                add_header X-Cache-Status $upstream_cache_status always;
                add_header Access-Control-Expose-Headers X-Cache-Status always;
                proxy_pass http://backend:8000;
            }
        }
    }
}
