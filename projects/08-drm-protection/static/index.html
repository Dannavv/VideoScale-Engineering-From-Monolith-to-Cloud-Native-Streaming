<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoScale | DRM Protection</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --drm-gold: #ffd700;
            --bg: #0d1117;
            --card: #161b22;
        }

        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 900px;
            text-align: center;
        }

        .player-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            border: 2px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .security-badge {
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--drm-gold);
            color: black;
            padding: 10px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: black;
        }

        .status-panel {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            text-align: left;
            font-size: 0.9rem;
        }

        .log-item { margin-bottom: 5px; }
        .success { color: #3fb950; }
        .warning { color: var(--drm-gold); }
    </style>
</head>
<body>

<div class="container">
    <div style="margin-bottom: 2rem;">
        <h1 style="color: white; margin-bottom: 0.5rem;">🔒 DRM Content Protection</h1>
        <p style="color: #8b949e;">AES-128 Encryption & ClearKey Integration</p>
    </div>

    <div class="player-card">
        <div class="security-badge">🔐</div>
        <video id="video" controls></video>
        
        <div class="status-panel" id="logs">
            <div class="log-item">[SYSTEM] Fetching Master Playlist...</div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const logs = document.getElementById('logs');
    const source = '/data/encrypted.m3u8';

    function addLog(msg, type = '') {
        const div = document.createElement('div');
        div.className = 'log-item ' + type;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logs.appendChild(div);
        if (logs.children.length > 5) logs.removeChild(logs.children[0]);
    }

    if (Hls.isSupported()) {
        const hls = new Hls({
            // HLS.js automatically handles standard AES-128 KEY tags in the manifest
            // It will fetch the key from the URI specified in the .m3u8
        });
        
        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            addLog("Playlist Loaded. AES-128 Key detected.", "warning");
            video.play();
        });

        hls.on(Hls.Events.KEY_LOADED, () => {
            addLog("Decryption Key acquired from License Server!", "success");
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.details === 'keyLoadError') {
                addLog("CRITICAL: License Denied. Content Locked.", "error");
            }
        });
    }
</script>

</body>
</html>
