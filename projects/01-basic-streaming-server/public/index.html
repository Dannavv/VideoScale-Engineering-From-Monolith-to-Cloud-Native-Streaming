<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Streamer | Project 1</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 0.5rem;
            outline: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .info {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Adaptive Streamer v1</h1>
        <video id="videoPlayer" controls>
            <source src="/video" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="info">
            Notice how you can seek even if the video hasn't fully loaded. <br>
            Check the <b>Network Tab</b> in DevTools to see <code>206 Partial Content</code>.
        </div>
    </div>
</body>
</html>
