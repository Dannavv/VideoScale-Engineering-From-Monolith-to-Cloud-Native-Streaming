worker_processes auto;
rtmp_auto_push on;
events {}

rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        application live {
            live on;
            record off;

            # 🛠️ Live Repackaging into HLS
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3; # 3 second fragments for low latency
            hls_playlist_length 60;
            
            # Allow everyone to stream in for this lab
            allow publish all;
            allow play all;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 80;

        # Serve the HLS segments
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *; # CORS for the player
        }

        # Serve the Dashboard
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
