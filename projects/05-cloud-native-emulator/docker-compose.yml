services:
  # 🗄️ STORAGE (AWS S3 Alternative)
  minio:
    image: minio/minio
    ports:
      - "9004:9000" # S3 API
      - "9005:9001" # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 📨 BROKER (AWS SQS Alternative)
  redis:
    image: redis:alpine
    ports:
      - "6380:6379"

  # 🌐 API GATEWAY
  api:
    build: ./api
    ports:
      - "8005:8000"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - minio
      - redis

  # 🏗️ WORKER (AWS Lambda Alternative)
  worker:
    build: ./worker
    environment:
      - S3_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - minio

volumes:
  minio_data:
