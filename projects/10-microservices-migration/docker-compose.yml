services:
  # 🌐 THE FRONT DOOR
  gateway:
    image: nginx:alpine
    ports:
      - "8010:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - catalog-service

  # 🔐 AUTH SERVICE
  auth-service:
    build: 
      context: .
      dockerfile_inline: |
        FROM python:3.9-slim
        RUN pip install fastapi uvicorn
        WORKDIR /app
        COPY auth/main.py .
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  # 📚 CATALOG SERVICE
  catalog-service:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.9-slim
        RUN pip install fastapi uvicorn
        WORKDIR /app
        COPY catalog/main.py .
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
