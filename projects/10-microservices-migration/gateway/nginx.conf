events {}

http {
    server {
        listen 80;

        # 🚀 Proxy to Auth Service (Trailing slash strips the /auth prefix)
        location /auth/ {
            proxy_pass http://auth-service:8000/;
        }

        # 🚀 Proxy to Catalog Service
        location /catalog/ {
            proxy_pass http://catalog-service:8000/;
        }

        # 🚀 Proxy to Dashboard (Static)
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
