events {}

http {
    # 🛡️ PRODUCTION REALISM: Rate Limiting & Load Shedding
    # Limit requests per IP (10 requests per second)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # Apply rate limiting globally
        limit_req zone=api_limit burst=20 nodelay;

        # 🚀 Proxy to Auth Service (Trailing slash strips the /auth prefix)
        location /auth/ {
            proxy_pass http://auth-service:8000/;
        }

        # 🚀 Proxy to Catalog Service
        location /catalog/ {
            proxy_pass http://catalog-service:8000/;
        }

        # 🚀 Proxy to Dashboard (Static)
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
